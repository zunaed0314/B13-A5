<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>

</head>


<body class="bg-soft">
    <section id="up" class="p-4 flex justify-between shadow sticky">
        <div class="flex gap-3 justify-center items-center">
            <img src="assets/github-logo.png" class="w-10 h-10">
            <h1 class="text-2xl font-bold">Github Isssues Tracker</h1>
        </div>
        <div class="flex gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
            </label>
            <button class="btn btn-primary">+New Issue</button>
        </div>
    </section>



    <section class="w-9/12 mx-auto m-10">
        <div class="flex gap-3">
            <button id="all" class="btns btn btn-primary btn-outline btn-active" onclick="btn(this)">All</button>
            <button id="opened" class="btns btn btn-primary btn-outline" onclick="btn(this)">Open</button>
            <button id="closed" class="btns btn btn-primary btn-outline" onclick="btn(this)">Closed</button>
        </div>
    </section>

    <section class="w-9/12 shadow mx-auto rounded-md">
        <div class="border-b border-gray-300 p-5 flex justify-between items-center">
            <div class="flex flex-row gap-2">
                <div class="h-10 w-10 bg-gray-300 flex justify-center items-center rounded-full">
                    <img src="assets/Aperture.png">
                </div>
                <div>
                    <p class="font-medium text-sm">50 Issues</p>
                    <p class="text-gray-400 text-sm">Track and manage your project issues</p>
                </div>
            </div>
            <div class="status-colors flex gap-3 items-center">
                <div class="w-4 h-4 bg-green-400 rounded-full">

                </div>
                <p class="text-sm text-gray-600">Open</p>
                <div class="w-4 h-4 bg-purple-400 rounded-full">

                </div>
                <p class="text-sm text-gray-600">CLosed</p>
            </div>
        </div>


        <!-- CARD SECTIONS -->
        <div id="all" class="grid grid-cols-4 gap-4 p-5">
                    

        </div>

        <div id="open" class="grid grid-cols-4 gap-6 p-5"></div>

        <div id="close" class="grid grid-cols-4 gap-6 p-5"></div>

    </section>

    <script src="js/tab-buttons.js"></script>
</body>

</html>
