<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>GitHub Issue Tracker</title>

</head>

<body>
    <div class="flex justify-center items-center min-h-screen bg-base-200">

        <div class="card w-96 bg-base-100 shadow-xl">
            <div class="card-body">

                <img src="assets/github-logo.png" class="w-20 h-20 mx-auto">
                <h2 class="text-3xl font-bold text-center">GitHub Issues Tracker</h2>
                <p class="text-center text-gray-500">Sign in to manage your issues</p>
                <div class="form-control">
                    <label class="label">
                        <span class="label-text text-neutral mb-1">Username</span>
                    </label>
                    <input id="username" type="text" placeholder="Enter username" class="input" required>
                </div>

                <div class="form-control mt-4">
                    <label class="label">
                        <span class="label-text text-neutral mb-1">Password</span>
                    </label>
                    <input id="password" type="password" placeholder="Enter password" class="input" required>
                </div>

            </div>
            <button id="signin" class="btn btn-primary w-8/12 rounded-md mb-6 mx-auto">Sign In</button>
        </div>

        <script src="js/signin.js"></script>
</body>

</html>
